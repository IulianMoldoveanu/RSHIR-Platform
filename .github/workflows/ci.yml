# CI gate: typecheck + lint + tests on every PR + main push.
#
# Vercel handles deployment, but `next build` strips test files, so type
# errors in *.test.ts files were slipping past CI for weeks. This workflow
# closes that gap by running `pnpm typecheck` (which sees the whole repo)
# alongside lint + tests.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm

      # --frozen-lockfile doubles as the lockfile-drift gate: if a workspace
      # package.json was changed without regenerating pnpm-lock.yaml (cluster 4
      # of the recent CI noise), this step fails in ~15s with
      # ERR_PNPM_OUTDATED_LOCKFILE before any lint/typecheck/test runs.
      # See RCA rank 6 LOCKFILE-DRIFT-FAST-FAIL.
      - name: Install dependencies (lockfile drift gate)
        run: pnpm install --frozen-lockfile

      # --if-present skips workspaces (config-*, etc.) that don't define
      # the script — keeps the gate strict where it matters and quiet
      # where it doesn't.
      #
      # Lint runs FIRST as a fast-fail (~30s) to catch react/no-unescaped-entities
      # and similar style errors before the slower typecheck + test stages.
      # Past two CI failure waves (pfa-signup → casual-signup raw-quote bugs)
      # would have been blocked here in under a minute instead of after the
      # full pipeline. See RCA rank 4 PRE-COMMIT-NO-LINT-RECURRENCE.
      - name: Lint (all workspaces) — fast-fail gate
        run: pnpm -r --if-present lint

      - name: Typecheck (all workspaces)
        run: pnpm -r --if-present typecheck

      - name: Test (all workspaces)
        run: pnpm -r --if-present test

      # Warning-only i18n parity check. Reports RO↔EN dictionary drift in
      # the storefront so we catch regressions early, but does NOT fail CI
      # while we're still translating. Flip to `--strict` (or remove
      # `continue-on-error`) once parity is enforced. See
      # `scripts/i18n-parity-check.mjs`.
      - name: i18n parity (warning-only)
        continue-on-error: true
        run: node scripts/i18n-parity-check.mjs
