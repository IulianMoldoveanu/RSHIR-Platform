# STATUS: cron schedule commented out per Iulian directive ("focus pe
# infrastructura de livrare, NU F6 self-improving loop").
#
# History of breakage (resolved up to feature-bug level):
#   1. PR #472 (2026-05-16) added this cron BUT never seeded
#      TRUST_PROMOTE_CRON_TOKEN on either GitHub or Supabase → 16 days of
#      401 failures (resolved 2026-06-01: token minted + dual-set).
#   2. Edge Function had verify_jwt=true regressing the cron auth
#      pattern → 401 with "Missing authorization header" (resolved
#      2026-06-01: redeployed with verify_jwt=false via
#      `node scripts/deploy-fn-with-shared.mjs trust-promote-daily
#       --verify-jwt=false`).
#   3. Feature-level bug REMAINS: migration
#      `supabase/migrations/20260514_001_trust_auto_promotion.sql` view
#      definition references `copilot_agent_runs.agent_name` but prod
#      schema only has `agent_id` (uuid). Migration cannot be applied
#      as-is. Verified via Management API SQL:
#        SELECT column_name FROM information_schema.columns
#         WHERE table_name='copilot_agent_runs' AND column_name='agent_name';
#        → 0 rows.
#      Fix requires either (a) adding `agent_name` join to agents table,
#      or (b) rewriting v_agent_clean_runs_30d to use agent_id + join.
#
# Re-enable plan (when F6 trust auto-promotion becomes a priority):
#   1. Fix migration view JOIN — see git blame for original author intent.
#   2. Apply migration to prod (idempotent, safe).
#   3. Test EF manually: gh workflow run trust-promote-daily.yml -R IulianMoldoveanu/RSHIR-Platform
#   4. Uncomment the `schedule:` block below.
#
# Secrets ARE seeded (2026-06-01) — token rotation runbook in
# docs/ops/CRONS-RUNBOOK.md still applies when re-enabled.

name: trust-promote-daily

on:
  # schedule:
  #   - cron: '0 4 * * *'
  workflow_dispatch: {}

concurrency:
  group: trust-promote-daily
  cancel-in-progress: false

jobs:
  invoke:
    name: invoke trust-promote-daily
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST to Edge Function
        env:
          SUPABASE_URL: https://qfmeojeipncuxeltnvab.supabase.co
          TRUST_PROMOTE_CRON_TOKEN: ${{ secrets.TRUST_PROMOTE_CRON_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TRUST_PROMOTE_CRON_TOKEN}" ]]; then
            echo "::error::TRUST_PROMOTE_CRON_TOKEN repo secret is not set"
            exit 1
          fi
          echo "POST ${SUPABASE_URL}/functions/v1/trust-promote-daily"
          HTTP=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/functions/v1/trust-promote-daily" \
            -H "X-Cron-Token: ${TRUST_PROMOTE_CRON_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "status=${HTTP}"
          cat response.json | head -c 4000
          echo
          if [[ "${HTTP}" != "200" ]]; then
            echo "::error::trust-promote-daily returned ${HTTP}"
            exit 1
          fi
          if command -v jq >/dev/null 2>&1; then
            jq -r '"trust_rows=\(.trust_rows) promotions=\(.promotions) demotions=\(.demotions) resets=\(.resets) unchanged=\(.unchanged) errors=\(.errors)"' response.json
          fi
